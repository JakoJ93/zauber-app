<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spielkarte - Google Suche</title>
    <meta name="theme-color" content="#ffffff">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- STATE 1: Fake Google Image Search -->
    <div id="state1-google" class="state active">
        <!-- Header -->
        <header>
            <div class="top-row">
                <div class="header-left">
                    <span class="hamburger">
                        <svg focusable="false" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" fill="#5f6368"></path></svg>
                    </span>
                    <div class="logo">
                        <span style="color:#4285F4">G</span><span style="color:#EA4335">o</span><span style="color:#FBBC05">o</span><span style="color:#4285F4">g</span><span style="color:#34A853">l</span><span style="color:#EA4335">e</span>
                    </div>
                </div>
                <div class="profile-pic-container">
                    <!-- The invisible trigger area over the profile picture -->
                    <div id="trigger-state2" class="invisible-trigger"></div>
                    <div class="profile-pic">J</div>
                </div>
            </div>
            <div class="search-bar">
                <span class="search-icon">
                    <svg focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="#9aa0a6"></path></svg>
                </span>
                <input type="text" value="Spielkarte" readonly>
                <span class="mic-icon">
                    <svg focusable="false" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="m12 15c1.66 0 3-1.31 3-2.97v-7.02c0-1.66-1.34-3.01-3-3.01s-3 1.34-3 3.01v7.02c0 1.66 1.34 2.97 3 2.97z" fill="#4285f4"></path><path d="m11 18.08h2v3.92h-2z" fill="#34a853"></path><path d="m7.05 16.87c-1.27-1.33-2.05-2.83-2.05-4.87h2c0 1.45.56 2.42 1.47 3.38v.32l-1.15 1.18z" fill="#f4b400"></path><path d="m12 16.93a4.97 5.25 0 0 1 -3.54 -1.55l-1.41 1.49c1.26 1.34 3.02 2.13 4.95 2.13 3.87 0 6.99-2.92 6.99-7h-1.99c0 2.92-2.24 4.93-5 4.93z" fill="#ea4335"></path></svg>
                </span>
                <span class="lens-icon">
                    <svg focusable="false" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="m13.5 14.5c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2" fill="#4285f4"></path><path d="m11.5 19.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5m0-11.5c-3.59 0-6.5 2.91-6.5 6.5s2.91 6.5 6.5 6.5 6.5-2.91 6.5-6.5-2.91-6.5-6.5-6.5" fill="#ea4335"></path><path d="m11.5 3.5c-3.31 0-6 2.69-6 6h-1.5c0-4.14 3.36-7.5 7.5-7.5s7.5 3.36 7.5 7.5h-1.5c0-3.31-2.69-6-6-6" fill="#34a853"></path><path d="m19 19.5h-2.5v-1.5h2.5c1.1 0 2-.9 2-2v-2.5h1.5v2.5c0 1.93-1.57 3.5-3.5 3.5" fill="#fbbc05"></path></svg>
                </span>
            </div>
            <div class="tabs">
                <div class="tab active">Bilder</div>
                <div class="tab">Alle</div>
                <div class="tab">Shopping</div>
                <div class="tab">News</div>
                <div class="tab">Maps</div>
                <div class="tab">Videos</div>
                <div class="tab">Bücher</div>
            </div>
        </header>

        <!-- Image Grid -->
        <main class="image-grid">
            <div class="masonry-column">
                <div class="image-item" style="height: 180px; background-image: url('https://images.unsplash.com/photo-1543662589-9b936a282fbe?w=500&q=80');">
                    <div class="image-label">wikipedia.org</div>
                </div>
                <div class="image-item" style="height: 220px; background-image: url('https://images.unsplash.com/photo-1511117498436-b63e80cc05d6?w=500&q=80');">
                    <div class="image-label">amazon.de</div>
                </div>
                <div class="image-item" style="height: 150px; background-image: url('https://images.unsplash.com/photo-1596485888062-79331070e6c3?w=500&q=80');">
                    <div class="image-label">ebay.de</div>
                </div>
                <div class="image-item" style="height: 200px; background-image: url('https://images.unsplash.com/photo-1605806616949-1e87b487cb2a?w=500&q=80');">
                    <div class="image-label">bicyclecards.com</div>
                </div>
            </div>
            <div class="masonry-column">
                <div class="image-item" style="height: 200px; background-image: url('https://images.unsplash.com/photo-1563821015694-555e1a0b3f54?w=500&q=80');">
                    <div class="image-label">pinterest.de</div>
                </div>
                <div class="image-item" style="height: 160px; background-image: url('https://images.unsplash.com/photo-1629813589902-61dd83a6b30f?w=500&q=80');">
                    <div class="image-label">wikihow.com</div>
                </div>
                <div class="image-item" style="height: 240px; background-image: url('https://images.unsplash.com/photo-1543662589-9b936a282fbe?w=500&q=80');">
                    <div class="image-label">magicshop.ch</div>
                </div>
                <div class="image-item" style="height: 170px; background-image: url('https://images.unsplash.com/photo-1511117498436-b63e80cc05d6?w=500&q=80');">
                    <div class="image-label">etsy.com</div>
                </div>
            </div>
        </main>
    </div>

    <!-- STATE 2: The Glitch & Folded Card -->
    <div id="state2-production" class="state hidden">
        <!-- Folded Card Image -->
        <div id="folded-card-container">
            <div id="folded-card">
                <!-- Placeholder for folded card -->
                <div class="card-back-pattern"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
